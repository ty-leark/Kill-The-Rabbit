<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kill The Rabbit</title>
    <link rel="stylesheet" href="styles-oyster.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=Kumbh+Sans:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar__container">
            <a href="index.html" id="navbar__logo"> Kill The Rabbit</a>
            <ul class="navbar__menu">
                <li class="navbar__btn">
                    <a href="hatter.html" class="button">
                        Go Back
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Hero -->
    <div class="main">
            <div class="falling-fish"></div>
            <div class="main__img--container">
                <img src="Images/field.png" alt="pic" id="main__img">
            </div>
    </div>
    <script>
    const fishContainer = document.querySelector(".falling-fish");
    const fishCount = 30; // number of falling fish

    for (let i = 0; i < fishCount; i++) {
        const fish = document.createElement("img");
        fish.src = "Images/fish.png";
        fish.classList.add("fish");

        // random horizontal position
        fish.style.left = Math.random() * 100 + "vw";

        // random size
        const size = Math.random() * 70 + 30; // 20px to 60px
        fish.style.width = size + "px";

        // random animation duration
        const duration = Math.random() * 5 + 5; // 5s to 10s
        fish.style.animationDuration = duration + "s";

        // random animation delay
        fish.style.animationDelay = Math.random() * 5 + "s";

        fishContainer.appendChild(fish);
    }
    </script>

    <script src="app.js"></script>
</body>
</html>
